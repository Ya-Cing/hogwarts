<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霍格華茲魔法學院人生模擬器 - 學院運作版</title>
    <style>
        :root {
            --bg-main: #0a0a0f;
            --panel-bg: #12121c;
            --panel-brd: #1e1e2f;
            --accent-gold: #d4af37;
            --accent-purple: #9b5de5;
            --accent-blue: #00bfff;
            --accent-green: #2ed573;
            --accent-red: #ff4757;
            --text-main: #e2e8f0;
            --text-muted: #747d8c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* 頂部全域導航欄 */
        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--panel-brd);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo-area { font-weight: bold; color: var(--accent-gold); letter-spacing: 1px; font-size: 1.1rem; }
        .sys-ops { display: flex; gap: 8px; }
        .btn-sys { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-sys:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        /* 主畫面佈局 */
        #main-layout { flex-grow: 1; display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 50px); overflow: hidden; }
        @media (max-width: 768px) {
            #main-layout { grid-template-columns: 1fr; grid-template-rows: 180px 1fr; }
        }

        /* 左側：多功能 Tabs 控制面板 */
        #sidebar { background-color: var(--panel-bg); border-right: 1px solid var(--panel-brd); display: flex; flex-direction: column; overflow: hidden; }
        .tab-headers { display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--panel-brd); }
        .tab-btn { flex: 1; padding: 10px 5px; background: transparent; border: none; color: var(--text-muted); font-size: 0.8rem; cursor: pointer; text-align: center; font-weight: bold; }
        .tab-btn.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); background: rgba(255,255,255,0.02); }
        .tab-content-wrapper { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 0.85rem; line-height: 1.6; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* 右側：Chat/Log 沉浸對話視窗 */
        #content-window { display: flex; flex-direction: column; height: 100%; background: radial-gradient(circle at top, #151522 0%, #0a0a0f 100%); overflow: hidden; }
        #log-stream { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        /* 對話與日誌氣泡樣式 */
        .log-row { display: flex; flex-direction: column; animation: fadeIn 0.3s ease forwards; }
        .log-sender { font-size: 0.75rem; color: var(--accent-gold); margin-bottom: 3px; font-weight: bold; }
        .log-bubble { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-brd); padding: 12px 16px; border-radius: 4px; line-height: 1.7; max-width: 85%; font-size: 0.95rem; }
        
        /* 針對不同身份的氣泡著色 */
        .log-row.system .log-bubble { border-left: 3px solid var(--accent-blue); background: rgba(0, 191, 255, 0.02); color: #bde0fe; font-size: 0.85rem; }
        .log-row.npc .log-bubble { border-left: 3px solid var(--accent-purple); background: rgba(155, 93, 229, 0.02); font-style: italic; }
        .log-row.player .log-bubble { border-left: 3px solid var(--accent-gold); background: rgba(214, 175, 55, 0.02); align-self: flex-start; }

        /* 底端互動控制板 */
        #interactive-panel { padding: 20px; background: rgba(18, 18, 28, 0.95); border-top: 1px solid var(--panel-brd); display: flex; flex-direction: column; gap: 12px; }
        .options-group { display: flex; flex-direction: column; gap: 8px; }
        .btn-option { background: rgba(255,255,255,0.02); border: 1px solid var(--panel-brd); color: var(--text-main); padding: 12px 15px; text-align: left; border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-option:hover:not(:disabled) { border-color: var(--accent-gold); background: rgba(212, 175, 55, 0.04); transform: translateX(3px); }
        .btn-option:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .input-bar { display: flex; gap: 8px; }
        .txt-custom { flex-grow: 1; background: #000; border: 1px solid var(--panel-brd); color: #fff; padding: 10px; border-radius: 4px; font-size: 0.9rem; }
        .btn-exec { background: var(--accent-purple); color: white; border: none; padding: 0 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 即時動態懸浮通知 (Toast) */
        #toast-container { position: fixed; top: 60px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .toast { background: #1e1e2f; border-left: 4px solid var(--accent-gold); color: #fff; padding: 12px 20px; border-radius: 4px; font-size: 0.85rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease, fadeOut 0.3s ease forwards 3.5s; }
        .toast.success { border-left-color: var(--accent-green); }
        .toast.danger { border-left-color: var(--accent-red); }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .hud-item { background: rgba(0,0,0,0.15); padding: 6px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.02); }
        .hud-label { font-size: 0.75rem; color: var(--text-muted); display: block; }
        .hud-val { font-size: 0.9rem; font-weight: bold; color: var(--text-main); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">🔮 HOGWARTS ACADEMY SIMULATOR</div>
        <div id="timeline-indicator" style="font-size:0.85rem; color:var(--accent-gold);">載入時空軌道中...</div>
        <div class="sys-ops">
            <button class="btn-sys" onclick="saveSnapshot()">⚡ 覆寫快照</button>
            <button class="btn-sys" onclick="loadSnapshot()">📜 讀取存檔</button>
        </div>
    </header>

    <div id="main-layout">
        <div id="sidebar">
            <div class="tab-headers">
                <button class="tab-btn active" onclick="switchTab('tab-status')">巫師特質</button>
                <button class="tab-btn" onclick="switchTab('tab-npc')">人際網絡</button>
                <button class="tab-btn" onclick="switchTab('tab-spells')">魔法書庫</button>
                <button class="tab-btn" onclick="switchTab('tab-bag')">行李背包</button>
            </div>
            
            <div class="tab-content-wrapper">
                <div id="tab-status" class="tab-pane active">
                    <div class="hud-grid">
                        <div class="hud-item"><span class="hud-label">中文姓名</span><span class="hud-val" id="hud-name">林恩·沃克</span></div>
                        <div class="hud-item"><span class="hud-label">學院院風</span><span class="hud-val" id="hud-house" style="color:var(--accent-gold);">未定</span></div>
                        <div class="hud-item"><span class="hud-label">生理健康</span><span class="hud-val" id="hud-health">100/100</span></div>
                        <div class="hud-item"><span class="hud-label">精神心情</span><span class="hud-val" id="hud-mood">100/100</span></div>
                        <div class="hud-item"><span class="hud-label">視覺魅力</span><span class="hud-val" id="hud-charisma">50</span></div>
                        <div class="hud-item"><span class="hud-label">語言談吐</span><span class="hud-val" id="hud-speech">50</span></div>
                    </div>
                    <p style="color:var(--text-muted); font-size:0.75rem;">狀態標籤：<span id="hud-tags" style="color:#fff; background:var(--accent-purple); padding:1px 4px; border-radius:2px;">正常</span></p>
                </div>
                <div id="tab-npc" class="tab-pane">
                    <div id="npc-list-container" style="display:flex; flex-direction:column; gap:8px;">
                        <p style="color:var(--text-muted);">尚未與具名角色建立深度因果線。</p>
                    </div>
                </div>
                <div id="tab-spells" class="tab-pane">
                    <div class="hud-grid">
                        <div class="hud-item"><span class="hud-label">變形學熟練度</span><span class="hud-val" id="spell-trans">10%</span></div>
                        <div class="hud-item"><span class="hud-label">魔藥學熟練度</span><span class="hud-val" id="spell-potions">10%</span></div>
                        <div class="hud-item"><span class="hud-label">黑魔法防禦術</span><span class="hud-val" id="spell-dada">10%</span></div>
                        <div class="hud-item"><span class="hud-label">黑魔法傾向</span><span class="hud-val" id="spell-dark" style="color:var(--accent-red);">0%</span></div>
                    </div>
                </div>
                <div id="tab-bag" class="tab-pane">
                    <div class="hud-item" style="margin-bottom:10px;"><span class="hud-label">古靈閣常駐加隆</span><span class="hud-val" id="hud-galleon" style="color:var(--accent-gold);">0 G</span></div>
                    <p class="hud-label">持有裝備與資產物件：</p>
                    <ul id="inventory-list" style="padding-left:15px; margin-top:5px; color:var(--text-muted);">
                        <li>斜角巷入學通知書</li>
                    </ul>
                </div>
            </div>
        </div>

        <div id="content-window">
            <div id="log-stream">
                </div>
            
            <div id="interactive-panel">
                <div class="options-group" id="options-wrapper">
                    </div>
                <div class="input-bar">
                    <input type="text" id="custom-nlp-input" class="txt-custom" placeholder="不點擊按鈕？在此鍵入自訂決策行為（支援核心代碼語意對抗）...">
                    <button class="btn-exec" onclick="submitCustomNLP()">執行</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // 核心資料庫全狀態快照傳遞矩陣 (Database State Snapshots)
        let engineState = {
            player: { name: "林恩·沃克", house: "未分配", bloodline: "未定", tags: ["正常"] },
            stats: { health: 100, mood: 100, charisma: 50, speech: 50, galleon: 150 },
            skills: { transfiguration: 10, potions: 10, dada: 10, darkArts: 0 },
            inventory: ["二手法術書", "基礎大釜"],
            npcs: {
                "奧利凡德": { favor: 0, alert: 10, title: "魔杖店主" },
                "塞浦路斯教授": { favor: 0, alert: 40, title: "魔藥學教授 / 斯萊特林院長" },
                "艾莉絲 (自訂命定)": { favor: 25, alert: 5, title: "同級青梅竹馬" }
            },
            timeline: { week: 1, phase: "入學宣誓前夕" },
            scenePointer: "creation_bloodline"
        };

        window.onload = function() {
            triggerToast("🔮 歡迎來到霍格華茲主宰系統 V3.0", "success");
            updateHUD();
            advanceEngineScene();
        };

        // Tab 切換邏輯機制
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // 動態 Toast 懸浮浮窗提示模組
        function triggerToast(message, type = "normal") {
            let container = document.getElementById('toast-container');
            let t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerText = message;
            container.appendChild(t);
            setTimeout(() => { t.remove(); }, 3800);
        }

        // 更新左側與頂部 HUD 面板數據
        function updateHUD() {
            document.getElementById('timeline-indicator').innerText = `📅 第 ${engineState.timeline.week} 週 ｜ 當前時段：${engineState.timeline.phase}`;
            document.getElementById('hud-name').innerText = engineState.player.name;
            document.getElementById('hud-house').innerText = engineState.player.house;
            document.getElementById('hud-health').innerText = `${engineState.stats.health}/100`;
            document.getElementById('hud-mood').innerText = `${engineState.stats.mood}/100`;
            document.getElementById('hud-charisma').innerText = engineState.stats.charisma;
            document.getElementById('hud-speech').innerText = engineState.stats.speech;
            document.getElementById('hud-galleon').innerText = `${engineState.stats.galleon} G`;
            document.getElementById('hud-tags').innerText = engineState.player.tags.join(', ');
            
            document.getElementById('spell-trans').innerText = `${engineState.skills.transfiguration}%`;
            document.getElementById('spell-potions').innerText = `${engineState.skills.potions}%`;
            document.getElementById('spell-dada').innerText = `${engineState.skills.dada}%`;
            document.getElementById('spell-dark').innerText = `${engineState.skills.darkArts}%`;

            // 背包項目渲染
            let bag = document.getElementById('inventory-list');
            bag.innerHTML = engineState.inventory.map(i => `<li>${i}</li>`).join('');

            // NPC 列表持久渲染
            let npcBox = document.getElementById('npc-list-container');
            let npcHTML = "";
            for(let key in engineState.npcs) {
                let n = engineState.npcs[key];
                npcHTML += `
                    <div style="background:rgba(255,255,255,0.02); padding:8px; border:1px solid var(--panel-brd); border-radius:4px;">
                        <span style="color:var(--accent-gold); font-weight:bold;">${key}</span> <span style="font-size:0.7rem; color:var(--text-muted);">(${n.title})</span><br>
                        好感度: ${n.favor} ｜ 戒備值: ${n.alert}
                    </div>
                `;
            }
            npcBox.innerHTML = npcHTML;
        }

        // 像聊天視窗一樣持續追加日誌流 (Chat Stream Log)
        function writeToStream(sender, content, type = "system") {
            let stream = document.getElementById('log-stream');
            let row = document.createElement('div');
            row.className = `log-row ${type}`;
            
            let senderDiv = document.createElement('div');
            senderDiv.className = "log-sender";
            senderDiv.innerText = sender;
            
            let bubble = document.createElement('div');
            bubble.className = "log-bubble";
            bubble.innerHTML = content;
            
            row.appendChild(senderDiv);
            row.appendChild(bubble);
            stream.appendChild(row);
            
            // 自動平滑滾動至底端
            stream.scrollTop = stream.scrollHeight;
        }

        // 核心場景調度器 (State Machine Machine)
        function advanceEngineScene() {
            let wrapper = document.getElementById('options-wrapper');
            wrapper.innerHTML = "";
            
            if(engineState.scenePointer === "creation_bloodline") {
                writeToStream("【系統提示】", "自轉時鐘初始化配置完畢。請先向霍格華茲決策你的血統起源，這會重寫你的初始加隆與社會第一印象矩陣。", "system");
                createOption("👑 申報『純血古老世家』背景 (初始資產 500 加隆，自帶繁重世家政爭包袱)", () => {
                    engineState.stats.galleon = 500;
                    engineState.player.bloodline = "純血家族";
                    triggerToast("💰 古靈閣金庫已熱更新：加隆 +500", "success");
                    engineState.scenePointer = "ollivander_shop";
                    advanceEngineScene();
                });
                createOption("💎 申報『平凡混血巫師』背景 (初始資產 150 加隆，在世家與麻瓜派系間具備黃金社交彈性)", () => {
                    engineState.stats.galleon = 150;
                    engineState.player.bloodline = "混血家庭";
                    triggerToast("💰 古靈閣金庫已熱更新：加隆 +150", "success");
                    engineState.scenePointer = "ollivander_shop";
                    advanceEngineScene();
                });
            } 
            else if(engineState.scenePointer === "ollivander_shop") {
                writeToStream("【地理錨點：奧利凡德魔杖店】", "漫天濃霧籠罩著斜角巷。你推開門，風鈴清脆沙啞。面容清癯的老人從幾千個狹長貨架間滑了出來，銀白色的雙眼凝視著你。", "system");
                writeToStream("【加里克·奧利凡德】", "「哦……不必開口，孩子。魔杖選擇巫師，這是我們這一行永恆不變的真理。有些人血管裡流淌著雷電，有些人的靈魂裡藏著黑夜。來吧，感知你的魔力殘響。」", "npc");
                
                createOption("【穩健對接】用指尖溫和拂過杖柄，尋求獨角獸毛之穩定防禦盾牌 (+5% 施咒成功率)", () => {
                    engineState.inventory.push("黑胡桃木魔杖 (獨角獸毛)");
                    engineState.scenePointer = "sorting_ceremony";
                    triggerToast("🪄 獲取命定魔杖：獨角獸毛配置成功", "success");
                    advanceEngineScene();
                });
                createOption("【狂暴灌注】不作保留，將體內沉睡的魔力瘋狂灌注進龍的心弦 (+10% 威力/反噬高危)", () => {
                    engineState.inventory.push("銀梣木魔杖 (龍的心弦)");
                    engineState.scenePointer = "sorting_ceremony";
                    triggerToast("🪄 獲取命定魔杖：龍的心弦配置成功", "success");
                    advanceEngineScene();
                });
            }
            else if(engineState.scenePointer === "sorting_ceremony") {
                engineState.timeline.phase = "大禮堂分院儀式";
                writeToStream("【地理錨點：霍格華茲大禮堂】", "無數懸浮蠟燭在天花板閃爍。幾大古老世家的繼承人們身著華麗長袍，冷酷地注視著新生。破舊的分院帽落入你的頭頂，冰冷的低語在你的腦海深處猛烈炸響。", "system");
                writeToStream("【分院帽的靈魂考驗】", "「我看見了渴望，看到了極具張力的意志。你想與華勒斯的黑市共舞，還是走向寒冷的防禦塔？告訴我自由意志的方向！」", "npc");
                
                createOption("【順應命定推薦】進入追求極致求知的「雷文克勞」院風 (聲望+15，施咒成功率常駐加成)", () => {
                    engineState.player.house = "雷文克勞";
                    engineState.scenePointer = "weekly_loop";
                    triggerToast("🦅 鷹院圖騰覺醒！學院聲望上升", "success");
                    advanceEngineScene();
                });
                createOption("【違背意志心靈覆寫】強行踏入世家權貴盤踞的「史萊哲林」 (每週獲得家族固定金錢津貼)", () => {
                    engineState.player.house = "史萊哲林";
                    engineState.scenePointer = "weekly_loop";
                    triggerToast("🐍 蛇院圖騰覺醒！黑魔法潛力激發", "success");
                    advanceEngineScene();
                });
            }
            else if(engineState.scenePointer === "weekly_loop") {
                engineState.timeline.phase = `第 ${engineState.weekClock || 1} 週 循環軸`;
                writeToStream("【校園自轉進度指引】", `時間步長向前推進。你的青梅竹馬 <b>艾莉絲</b> 正坐在休息室長椅上翻閱羊皮紙，而塞浦路斯教授正瞇起眼睛走過走廊。請分派本時段行事曆。`, "system");
                
                createOption("🧪 【日間核心課程】參與塞浦路斯教授高壓的魔藥學熬製實作 (心情-12 / 檢定成功賺取加隆)", () => {
                    executeCurriculumAction("potions");
                });
                createOption("💞 【自由時間社交】消耗 5 加隆，邀請艾莉絲前往黑湖畔漫步 (降低其戒備值並大幅解鎖好感)", () => {
                    executeSocialAction();
                });
                createOption("🌲 【夜間黑夜遊蕩】宵禁後潛入禁忌森林邊緣採集高危奇獸素材 (大成功獲得暴利/失敗重傷)", () => {
                    executeNightRoamAction();
                });
            }
            else if(engineState.scenePointer === "died") {
                writeToStream("【終極死亡壞結局】", "你的肉體健康或心情崩潰線跌破 0 安全防線。數據庫已被鎖定。你被送往聖蒙果魔法醫院，流放在校園編年史之外。", "system");
            }
            
            updateHUD();
        }

        // 生成選項按鈕並強制綁定點擊即鎖定（防止多重觸發）
        function createOption(text, callback) {
            let wrapper = document.getElementById('options-wrapper');
            let btn = document.createElement('button');
            btn.className = "btn-option";
            btn.innerHTML = text;
            btn.onclick = function() {
                // 點擊後，立刻將本輪所有按鈕停用（模擬 GitHub Pages 單向事件推進）
                document.querySelectorAll('.btn-option').forEach(b => b.disabled = true);
                callback();
            };
            wrapper.appendChild(btn);
        }

        // 日間課程隨機骰點判定
        function executeCurriculumAction(spellType) {
            engineState.stats.mood -= 12;
            let dice = Math.floor(Math.random() * 100) + 1;
            
            if(dice <= 65) {
                engineState.skills.potions += 5;
                engineState.stats.galleon += 20;
                engineState.npcs["塞浦路斯教授"].favor += 5;
                writeToStream("【玩家行動】", "你集中精神，精準控制了草藥的熬製火候，成功調製出符合標準的縮小劑。", "player");
                writeToStream("【塞浦路斯教授】", "「馬馬虎虎。混血的血液裡居然能有一絲精準，拿著你的材料獎勵，滾回座位。」", "npc");
                triggerToast("✨ 魔藥學熟練度 +5% ｜ 加隆 +20", "success");
            } else {
                engineState.npcs["塞浦路斯教授"].alert += 10;
                writeToStream("【系統提示】", "大釜內部發生魔力紊亂大爆炸！黑色毒氣瞬間瀰漫地地窖教室，你被罰清理地下室大釜一整週。", "system");
                triggerToast("❌ 課堂大失敗：院長戒備值飆升", "danger");
            }
            
            checkStateCap();
        }

        // 社交約會事件
        function executeSocialAction() {
            if(engineState.stats.galleon < 5) {
                triggerToast("⚠️ 經濟匱乏：你長袍口袋裡的加隆不足以購買黃油啤酒！", "danger");
                advanceEngineScene();
                return;
            }
            engineState.stats.galleon -= 5;
            engineState.npcs["艾莉絲 (自訂命定)"].favor += 15;
            engineState.npcs["艾莉絲 (自訂命定)"].alert -= 5;
            
            writeToStream("【玩家行動】", "你買了兩瓶熱氣騰騰的黃油啤酒，遞給了長椅上略顯疲憊的艾莉絲，陪她並肩走向黑湖。", "player");
            writeToStream("【艾莉絲】", "「真是的……你總是挑我最煩躁的時候過來。不過，這啤酒的甜度剛剛好，這次就原諒你了。」", "npc");
            triggerToast("💞 情感鏈連動：艾莉絲好感顯著上升", "success");
            
            checkStateCap();
        }

        // 高風險夜遊事件
        function executeNightRoamAction() {
            let dice = Math.floor(Math.random() * 100) + 1;
            if(dice <= 40) { // 40% 狼人/奇獸高危致殘判定
                engineState.stats.health -= 45;
                engineState.player.tags = ["受傷"];
                writeToStream("【黑夜遊蕩突發危機】", "你在森林陰暗的迷霧中踩斷了枯枝，一隻狂暴的狼人殘響猛然撕開草叢！你拼死施展惡咒才得以逃脫，但右臂遭到撕裂性重創！", "system");
                triggerToast("🩸 遭遇奇獸重創：健康 -45！", "danger");
            } else {
                engineState.stats.galleon += 80;
                engineState.skills.darkArts += 8;
                writeToStream("【玩家行動】", "你成功潛入禁忌森林最深處的靜態節點，避開了草藥教授的防線，割取到了極其珍貴的獨角獸尾毛並在翻倒巷黑市拋售。", "player");
                triggerToast("💰 走私成功：黑市暴利加隆 +80", "success");
            }
            
            checkStateCap();
        }

        // 崩塌防禦防線與存活機制判定
        function checkStateCap() {
            if(engineState.stats.health <= 0 || engineState.stats.mood <= 0) {
                engineState.scenePointer = "died";
            } else {
                engineState.timeline.week++;
            }
            advanceEngineScene();
        }

        // 自由去結構化文字輸入 (NLP 語意解析對抗)
        function submitCustomNLP() {
            let inputBar = document.getElementById('custom-nlp-input');
            let text = inputBar.value.trim();
            if(!text) return;

            writeToStream("【自訂巫師言行】", `“${text}”`, "player");

            // 禁咒與極端壞結局代價防禦
            if(text.includes("阿哇呾喀呾啦") || text.includes("索命咒")) {
                engineState.scenePointer = "died";
                writeToStream("【魔法部傲羅突擊執法線】", "警告！全校常駐魔力監視網偵測到 Tier 3 不赦禁咒殘留！執行傲羅突擊當街鎖定，存報快照被強制凍結，你已被押解移送阿茲卡班無期徒刑審判艙！", "system");
                triggerToast("💀 觸發終極社會性死亡壞結局", "danger");
            } else if(text.includes("欺騙") || text.includes("編造謊言")) {
                if(engineState.stats.speech > 45) {
                    engineState.skills.dada += 4;
                    writeToStream("【系統提示】", "你的說服合理性骰點經後台對抗判定成功！順利瞞過了周圍眼線。", "system");
                    triggerToast("✨ 語言對抗勝利", "success");
                } else {
                    engineState.stats.mood -= 15;
                    writeToStream("【系統提示】", "教授一眼看穿了你拙劣且毫無邏輯的藉口，勒令你回寢室閉門思過！", "system");
                    triggerToast("❌ 談吐欺騙失敗", "danger");
                }
            } else {
                engineState.stats.mood -= 5;
                writeToStream("【世界自轉時鐘】", "你的去結構化決策已被 DM 核心捕獲。世界線主動吞噬並消化了你的行為，時間繼續推移。", "system");
            }

            inputBar.value = "";
            checkStateCap();
        }

        // LocalStorage 快照持存控制協議
        function saveSnapshot() {
            localStorage.setItem('hogwarts_academy_v3_save', JSON.stringify(engineState));
            triggerToast("💾 金色魔力刻印完畢！全數據狀態已成功持久持存。", "success");
        }

        function loadSnapshot() {
            let data = localStorage.getItem('hogwarts_academy_v3_save');
            if(data) {
                engineState = JSON.parse(data);
                document.getElementById('log-stream').innerHTML = ""; // 讀檔時重置日誌畫面以防混淆
                writeToStream("【時空回溯】", "已成功啟動快照傳遞協定，完整覆寫當前對話狀態遺忘。", "system");
                updateHUD();
                advanceEngineScene();
                triggerToast("📜 歷史命軌讀取成功！時空重組完畢。", "success");
            } else {
                triggerToast("⚠️ 未偵測到有效的持久層快照檔案。", "danger");
            }
        }
    </script>
</body>
